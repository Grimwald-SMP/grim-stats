name: Release

# Publishing a version tag (v1.2.3) builds the mod and attaches the jar to a GitHub release.
# Typical flow:
#   ./scripts/bump-version.ps1 minor -Tag     (or bump-version.sh minor --tag)
#   git push && git push origin v<version>

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches mod_version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(sed -n 's/^mod_version=//p' gradle.properties | tr -d '[:space:]')"
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match gradle.properties mod_version=$version" >&2
            echo "Bump the version first (scripts/bump-version) so the jar is named correctly." >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build server jar (includes dashboard + tests)
        run: chmod +x gradlew && ./gradlew build --console=plain

      - name: Verify the server jar was produced
        run: |
          jar="mod/build/libs/grimstats-${VERSION}.jar"
          if [ ! -f "$jar" ]; then
            echo "Expected server jar not found: $jar" >&2
            ls -l mod/build/libs >&2 || true
            exit 1
          fi
          echo "Server jar: $jar ($(du -h "$jar" | cut -f1))"

      - name: Extract changelog section for this version
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Pull the "## <version> - date" section body out of CHANGELOG.md, if present.
          awk -v ver="$version" '
            $0 ~ "^## " ver " " { grab = 1; next }
            grab && /^## /      { exit }
            grab                { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md for details." > release-notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: GrimStats ${{ github.ref_name }}
          body_path: release-notes.md
          # Attach only the runnable server mod jar (drop into a Fabric server's mods/ folder).
          # The -sources.jar is intentionally excluded.
          files: |
            mod/build/libs/grimstats-${{ env.VERSION }}.jar
          fail_on_unmatched_files: true
          generate_release_notes: false
