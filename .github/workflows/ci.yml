name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Gradle installs dashboard deps and builds the SPA itself, bundles it into the
      # jar, and runs the mod's JUnit tests as part of `build`.
      # chmod guards against the exec bit being lost when committing from Windows.
      - name: Build mod (includes dashboard + mod tests)
        run: chmod +x gradlew && ./gradlew build --console=plain

      - name: Dashboard tests (Vitest)
        run: npx vitest run
        working-directory: dashboard

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: grimstats-jar
          path: mod/build/libs/*.jar
          if-no-files-found: error
